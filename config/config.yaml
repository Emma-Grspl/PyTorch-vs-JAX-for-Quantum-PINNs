model:
  hidden_layers: [64, 128, 64]  # 3 couches cachées avec des tailles différentes
  num_fourier: 30
  fourier_scales: [0.1, 0.5]
  activation: "SiLU"

training:
  learning_rate: 0.001
  epochs_adam: 5000           # Phase 1 : Dégrossissage
  epochs_lbfgs: 1000          # Phase 2 : Finition millimétrique
  w_data: 0.0
  w_physics: 1.0              # Poids normalisé
  w_ic: 10.0                  # Contrainte forte sur le point de départ
  n_train_points: 40
  n_collocation_points: 400

physics:
  m: 1.0
  mu: 0.5
  k: 10.0
  t_max: 20.0
  noise_std: 0.05